<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Финансовый помощник</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <!-- Логотип и заголовок -->
            <div class="login-header">
                <div class="logo-icon-large">
                    <i class="fas fa-wallet"></i>
                </div>
                <h1>Финансовый помощник</h1>
                <p>Войдите в свой аккаунт</p>
            </div>

            <!-- Форма входа -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Пароль
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-input" id="loginPassword" placeholder="Введите пароль" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="showForgotPasswordMessage(); return false;">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-large">
                    <span>Войти</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Кнопка продолжить без регистрации -->
            <div class="continue-without-reg">
                <button type="button" class="btn btn-outline-secondary btn-large" id="continueWithoutRegBtn">
                    <span>Продолжить без регистрации</span>
                </button>
            </div>

            <!-- Регистрация -->
            <div class="login-footer">
                <p>Нет аккаунта? <a href="#" onclick="showRegisterMessage(); return false;">Зарегистрироваться</a></p>
            </div>
        </div>

        <!-- Декоративные элементы -->
        <div class="login-decoration">
            <div class="decoration-circle circle-1"></div>
            <div class="decoration-circle circle-2"></div>
            <div class="decoration-circle circle-3"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
