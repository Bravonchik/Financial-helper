<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Транзакции - Финансовый помощник</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="transactions.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <span class="logo-text">Финансовый помощник</span>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Открыть меню"><i class="fas fa-bars"></i></button>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="transactions.html" class="nav-link active">
                    <i class="fas fa-list"></i>
                    <span>Транзакции</span>
                </a>
                <a href="budget.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i>
                    <span>Бюджет</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>Отчёты</span>
                </a>
                <a href="goals.html" class="nav-link">
                    <i class="fas fa-bullseye"></i>
                    <span>Цели</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>Профиль</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <div class="container">
            <!-- Заголовок -->
            <div class="page-header-transactions">
                <div>
                    <h1 class="page-title">Транзакции</h1>
                    <p class="page-subtitle">Все операции по вашему счёту</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-outline" onclick="downloadSampleCSV()" title="Скачать пример CSV">
                        <i class="fas fa-question-circle"></i>
                        <span>Пример CSV</span>
                    </button>
                    <button class="btn btn-outline" onclick="document.getElementById('csvFileInput').click()" title="Импорт из CSV">
                        <i class="fas fa-file-import"></i>
                        <span>Импорт CSV</span>
                    </button>
                    <button class="btn btn-success" onclick="exportCSV()" title="Экспорт в CSV">
                        <i class="fas fa-file-export"></i>
                        <span>Экспорт CSV</span>
                    </button>
                    <button class="btn btn-primary" onclick="openAddTransactionModal()">
                        <i class="fas fa-plus"></i>
                        <span>Добавить</span>
                    </button>
                    <!-- Скрытый input для выбора CSV-файла -->
                    <input type="file" id="csvFileInput" accept=".csv" style="display:none">
                </div>
            </div>

            <!-- Фильтры -->
            <div class="filters-section">
                <div class="filters-header">
                    <i class="fas fa-filter"></i>
                    <span>Фильтры</span>
                </div>
                <div class="filters-content">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Поиск по описанию..." class="search-input">
                    </div>
                    <select id="categoryFilter" class="filter-select">
                        <option>Все категории</option>
                        <option>Стипендия</option>
                        <option>Подработка</option>
                        <option>Продукты</option>
                        <option>Транспорт</option>
                        <option>Развлечения</option>
                        <option>Связь</option>
                        <option>Одежда</option>
                    </select>
                    <select id="typeFilter" class="filter-select">
                        <option>Все операции</option>
                        <option>Доход</option>
                        <option>Расход</option>
                    </select>
                    <select id="monthFilter" class="filter-select">
                        <option value="">Все месяцы</option>
                    </select>
                    <select id="sortSelect" class="filter-select">
                        <option value="date-desc">Сначала новые</option>
                        <option value="date-asc">Сначала старые</option>
                        <option value="amount-desc">Сумма: больше → меньше</option>
                        <option value="amount-asc">Сумма: меньше → больше</option>
                    </select>
                </div>
            </div>

            <!-- Таблица транзакций -->
            <div class="transactions-table-container">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Категория</th>
                            <th>Описание</th>
                            <th>Тип</th>
                            <th>Сумма</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsBody">
                        <tr><td><span class="skeleton skeleton-cell" style="width:72px"></span></td><td><span class="skeleton skeleton-cell" style="width:90px"></span></td><td><span class="skeleton skeleton-cell" style="width:140px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td><td><span class="skeleton skeleton-cell" style="width:70px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td></tr>
                        <tr><td><span class="skeleton skeleton-cell" style="width:72px"></span></td><td><span class="skeleton skeleton-cell" style="width:110px"></span></td><td><span class="skeleton skeleton-cell" style="width:160px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td><td><span class="skeleton skeleton-cell" style="width:70px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td></tr>
                        <tr><td><span class="skeleton skeleton-cell" style="width:72px"></span></td><td><span class="skeleton skeleton-cell" style="width:80px"></span></td><td><span class="skeleton skeleton-cell" style="width:120px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td><td><span class="skeleton skeleton-cell" style="width:70px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td></tr>
                        <tr><td><span class="skeleton skeleton-cell" style="width:72px"></span></td><td><span class="skeleton skeleton-cell" style="width:100px"></span></td><td><span class="skeleton skeleton-cell" style="width:150px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td><td><span class="skeleton skeleton-cell" style="width:70px"></span></td><td><span class="skeleton skeleton-cell" style="width:55px"></span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Модальное окно добавления / редактирования транзакции -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="transactionModalTitle">Добавить транзакцию</h2>
                <button class="modal-close" onclick="closeModal('transactionModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="transactionForm">
                    <input type="hidden" id="transactionId" value="">
                    <div class="form-group">
                        <label>Тип операции</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="type" value="income" id="typeIncome" checked>
                                <span>Доход</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="type" value="expense" id="typeExpense">
                                <span>Расход</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <select class="form-input" id="transactionCategory" required>
                            <option value="">Выберите категорию</option>
                            <option>Стипендия</option>
                            <option>Подработка</option>
                            <option>Продукты</option>
                            <option>Транспорт</option>
                            <option>Развлечения</option>
                            <option>Связь</option>
                            <option>Одежда</option>
                            <option>Прочее</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <input type="text" class="form-input" id="transactionDescription" placeholder="Введите описание" required>
                    </div>
                    <div class="form-group">
                        <label>Сумма (Р)</label>
                        <input type="number" class="form-input" id="transactionAmount" placeholder="0" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Дата</label>
                        <input type="date" class="form-input" id="transactionDate" required>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="transactionRecurring">
                            <span>Повторять каждый месяц</span>
                        </label>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('transactionModal')">Отмена</button>
                        <button type="button" class="btn btn-danger" id="deleteTransactionBtn" style="display:none;" onclick="deleteCurrentTransaction()">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                        <button type="submit" class="btn btn-primary" id="transactionSubmitBtn">Добавить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
    <script src="common.js"></script>
    <script src="transactions.js"></script>
</body>
</html>
