<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Финансовый помощник</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <span class="logo-text">Финансовый помощник</span>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Открыть меню"><i class="fas fa-bars"></i></button>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="transactions.html" class="nav-link">
                    <i class="fas fa-list"></i>
                    <span>Транзакции</span>
                </a>
                <a href="budget.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i>
                    <span>Бюджет</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>Отчёты</span>
                </a>
                <a href="goals.html" class="nav-link">
                    <i class="fas fa-bullseye"></i>
                    <span>Цели</span>
                </a>
                <a href="profile.html" class="nav-link active">
                    <i class="fas fa-user"></i>
                    <span>Профиль</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <div class="container">
            <!-- Вторичная навигация -->
            <div class="profile-tabs">
                <a href="#" class="profile-tab active" onclick="switchProfileTab('profile', this); return false;">
                    <i class="fas fa-user"></i>
                    <span>Профиль</span>
                </a>
                <a href="#" class="profile-tab" onclick="switchProfileTab('settings', this); return false;">
                    <i class="fas fa-bell"></i>
                    <span>Настройки</span>
                </a>
                <a href="#" class="profile-tab" onclick="switchProfileTab('security', this); return false;">
                    <i class="fas fa-lock"></i>
                    <span>Безопасность</span>
                </a>
            </div>

            <!-- Карточка профиля -->
            <div class="profile-card">
                <!-- Вкладка: Профиль -->
                <div id="profileTab" class="profile-tab-content active">
                    <!-- Личная информация -->
                    <div class="profile-section">
                        <h2 class="section-title">Личная информация</h2>
                    
                    <!-- Фото профиля -->
                    <div class="profile-photo-section">
                        <div class="profile-photo-container">
                            <div class="profile-photo">
                                <i class="fas fa-user"></i>
                            </div>
                            <button class="photo-edit-btn">
                                <i class="fas fa-camera"></i>
                            </button>
                        </div>
                        <div class="photo-upload-section">
                            <button class="btn btn-outline">
                                <i class="fas fa-upload"></i>
                                <span>Загрузить фото</span>
                            </button>
                            <p class="upload-hint">JPG, PNG. Макс. 5МВ</p>
                        </div>
                    </div>

                    <!-- Форма личной информации -->
                    <form class="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Имя</label>
                                <input type="text" class="form-input" value="Алексей" required>
                            </div>
                            <div class="form-group">
                                <label>Фамилия</label>
                                <input type="text" class="form-input" value="Иванов" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>
                                <i class="fas fa-envelope"></i>
                                Email
                            </label>
                            <input type="email" class="form-input" value="alexey.ivanov@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>
                                <i class="fas fa-phone"></i>
                                Телефон
                            </label>
                            <input type="tel" class="form-input" value="+7 (999) 123-45-67" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i>
                            <span>Сохранить изменения</span>
                        </button>
                    </form>
                </div>

                <!-- Финансовые настройки -->
                <div class="profile-section">
                    <h2 class="section-title">Финансовые настройки</h2>
                    
                    <form class="profile-form">
                        <div class="form-group">
                            <label>Валюта по умолчанию</label>
                            <select class="form-input">
                                <option>Р Российский рубль</option>
                                <option>$ Доллар США</option>
                                <option>€ Евро</option>
                                <option>¥ Японская иена</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Начало месяца</label>
                            <select class="form-input">
                                <option>1-е число</option>
                                <option>5-е число</option>
                                <option>10-е число</option>
                                <option>15-е число</option>
                                <option>20-е число</option>
                                <option>25-е число</option>
                            </select>
                        </div>
                    </form>
                </div>
                </div>

                <!-- Вкладка: Настройки -->
                <div id="settingsTab" class="profile-tab-content">
                    <div class="profile-section">
                        <h2 class="section-title">Настройки уведомлений</h2>
                        <form class="profile-form">
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="notifTransactions" checked>
                                    <span>Уведомления о транзакциях</span>
                                </label>
                            </div>
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="notifBudget" checked>
                                    <span>Уведомления о превышении бюджета</span>
                                </label>
                            </div>
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="notifReports">
                                    <span>Еженедельные отчёты</span>
                                </label>
                            </div>
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="notifGoals" checked>
                                    <span>Уведомления о достижении целей</span>
                                </label>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="saveSettings()">
                                <i class="fas fa-save"></i>
                                <span>Сохранить настройки</span>
                            </button>
                        </form>
                    </div>

                    <div class="profile-section">
                        <h2 class="section-title">Общие настройки</h2>
                        <form class="profile-form">
                            <div class="form-group">
                                <label>Язык интерфейса</label>
                                <select class="form-input" id="langSelect">
                                    <option value="ru">Русский</option>
                                    <option value="en">English</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Тема оформления</label>
                                <select class="form-input" id="themeSelect">
                                    <option value="light">Светлая</option>
                                    <option value="dark">Тёмная</option>
                                    <option value="auto">Автоматическая</option>
                                </select>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Вкладка: Безопасность -->
                <div id="securityTab" class="profile-tab-content">
                    <!-- Смена пароля -->
                    <div class="profile-section">
                        <h2 class="section-title">Смена пароля</h2>
                        <form class="profile-form" id="changePasswordForm">
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Текущий пароль</label>
                                <input type="password" class="form-input" placeholder="Введите текущий пароль" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-key"></i> Новый пароль</label>
                                <input type="password" class="form-input" placeholder="Минимум 6 символов" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-key"></i> Подтвердите новый пароль</label>
                                <input type="password" class="form-input" placeholder="Повторите пароль" required>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                <span>Изменить пароль</span>
                            </button>
                        </form>
                    </div>

                    <!-- Выход -->
                    <div class="profile-section">
                        <h2 class="section-title">Сессия</h2>
                        <p style="color:#64748b;font-size:0.95rem;margin-bottom:1.25rem;">
                            После выхода потребуется снова войти в аккаунт.
                        </p>
                        <button class="btn btn-danger" onclick="logoutUser()">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Выйти из аккаунта</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
    <script src="common.js"></script>
    <script src="profile.js"></script>
</body>
</html>
