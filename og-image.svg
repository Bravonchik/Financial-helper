<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Декоративные элементы -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="white" opacity="0.1"/>
  <circle cx="1050" cy="150" r="60" fill="white" opacity="0.15"/>
  
  <!-- Основная карточка -->
  <rect x="200" y="150" width="800" height="330" rx="30" fill="white" opacity="0.95"/>
  
  <!-- Иконка кошелька -->
  <g transform="translate(500, 200)">
    <rect x="0" y="0" width="200" height="130" rx="15" fill="url(#cardGrad)"/>
    <path d="M40 40 L160 40 L160 90 L40 90 Z" fill="white" opacity="0.3"/>
    <path d="M50 50 L150 50 L150 80 L50 80 Z" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
    <circle cx="100" cy="65" r="15" fill="white" opacity="0.8"/>
    <path d="M95 65 L100 60 L105 65 L100 70 Z" fill="url(#cardGrad)"/>
  </g>
  
  <!-- Заголовок -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1e293b" text-anchor="middle">
    Финансовый помощник
  </text>
  
  <!-- Подзаголовок -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="32" fill="#64748b" text-anchor="middle">
    Управление личными финансами
  </text>
  
  <!-- Описание функций -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="24" fill="#475569" text-anchor="middle">
    Бюджет • Транзакции • Отчёты • Аналитика
  </text>
</svg>

