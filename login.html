<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Финансовый помощник</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-wallet"></i>
    </div>
    <h1 class="login-title">Финансовый помощник</h1>
    <p class="login-subtitle">Войдите в свой аккаунт</p>

    <form class="login-form" id="loginForm">
      <div class="login-field">
        <label><i class="fas fa-user"></i> Имя пользователя</label>
        <input type="text" id="loginUsername" class="login-input"
               placeholder="Введите имя пользователя" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label><i class="fas fa-lock"></i> Пароль</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" class="login-input"
                 placeholder="Введите пароль" autocomplete="current-password" required>
          <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <p class="login-error" id="loginError"></p>

      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Войти
      </button>
    </form>

    <p class="login-footer">
      Нет аккаунта?
      <a href="register.html" class="login-link">Зарегистрироваться</a>
    </p>
  </div>

  <script src="api.js"></script>
    <script src="i18n.js"></script>
  <script>
    if (localStorage.getItem('authToken')) location.replace('index.html');

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn      = document.getElementById('loginBtn');
      const errorEl  = document.getElementById('loginError');
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
      errorEl.textContent = '';

      try {
        const data = await API.post('/auth/login', { username, password });
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('authUser',  JSON.stringify(data.user));
        const params = new URLSearchParams(location.search);
        const next   = params.get('next');
        location.replace(next && next.endsWith('.html') ? next : 'index.html');
      } catch (err) {
        errorEl.textContent = err.message;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
      }
    });

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
